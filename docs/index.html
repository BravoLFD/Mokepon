<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>MOKEPON!</title>
    <link rel="stylesheet" href="./styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>


    <section id="seleccionarMascota">
        <h1 class="title">Mokepon!🔥💧🌱</h1>

        <h2 class="subtitulo">Selecciona tu mascota</h2>

        <div id="contenedorTarjetas" class="tarjetas">

        </div>
        <!-- <input type="radio" name="mascota" id="langostelvis"/>
            <label for="langostelvis">Langostelvis</label><br>
            
            <input type="radio" name="mascota" id="tucapalma"/>
            <label for="tucapalma">Tucapalma</label><br>
            
            <input type="radio" name="mascota" id="pydos"/>
            <label for="pydos">Pydos</label><br> -->
        <!--             
            Hipodoge ->Agua<br>
            Capipepo ->Tierra<br>
            Ratigueya ->Fuego<br>
            Langostelvis ->Agua y Fuego<br>
            Tucapalma ->Agua y Tierra<br>
            Pydos ->Tierra y Fuego<br> -->
        <button id="bselMascota">Seleccionar</button>
    </section>
    <section id="verMapa">
        <h2 class="subtitulo">Recorre el mapa con tu Mokepon!</h2>
        <canvas id="mapa" width="300" height="200"></canvas>
        <button onmouseup="detenerMovimiento()" onmousedown="moverArriba()" ontouchstart="moverArriba()"
            ontouchend="detenerMovimiento()">Arriba</button>
        <div>
            <button onmouseup="detenerMovimiento()" onmousedown="moverIzquierda()" ontouchstart="moverIzquierda()"
                ontouchend="detenerMovimiento()">Izquierda</button>
            <button onmouseup="detenerMovimiento()" onmousedown="moverAbajo()" ontouchstart="moverAbajo()"
                ontouchend="detenerMovimiento()">Abajo</button>
            <button onmouseup="detenerMovimiento()" onmousedown="moverDerecha()" ontouchstart="moverDerecha()"
                ontouchend="detenerMovimiento()">Derecha</button>
        </div>
    </section>


    <section id="seleccionarAtaque">
        <h1 class="title">Mokepon!🔥💧🌱</h1>

        <h2 class="subtitulo">Selecciona tu ataque</h2>
        <div id="contenedorBAtaques" class="tarjetasAtaques"></div>

        <div id="mensajes" class="oculto">
            <p id="Resultado"></p>

            <section id="reiniciar">
                <button id="bReiniciar">Reiniciar</button>
            </section>
        </div>

        <div class="Ataques">
            <div class="AtaquesJugador">
                <p id="spanNombreM"></p>
                <p id="spanVidaJ">0</p>
                <div id="AtaqueJugador"></div>
            </div>

            <div class="AtaquesEnemy">
                <p id="spanNombreMEnemy"></p>
                <p id="spanVidaE">0</p>
                <div id="AtaqueEnemy"></div>
            </div>
        </div>

    </section>
    <script src="/mokeponOptimizado.js"></script>

</body>

</html>
